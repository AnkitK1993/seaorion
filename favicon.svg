<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="5" fill="#080f1e"/>
  <!-- Gold arc with sparkle stars at top right -->
  <path d="M14,10 Q22,4 30,8" stroke="#c8a428" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Large star -->
  <line x1="27" y1="5.5" x2="27" y2="9.5" stroke="#c8a428" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="25" y1="7.5" x2="29" y2="7.5" stroke="#c8a428" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Small star -->
  <line x1="30" y1="9" x2="30" y2="12" stroke="#c8a428" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="28.5" y1="10.5" x2="31.5" y2="10.5" stroke="#c8a428" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Red right-pointing triangle (the brand "A" mark) -->
  <polygon points="4,8 4,24 22,16" fill="#dc2626"/>
</svg>
